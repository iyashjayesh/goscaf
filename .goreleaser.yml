project: goscaf
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: goscaf
    main: ./main.go
    binary: goscaf
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -w -s -X github.com/iyashjayesh/goscaf/cmd.Version={{.Version}}

archives:
  - id: goscaf
    builds:
      - goscaf
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

snapshot:
  name_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "Merge pull request"
      - "Merge branch"

brews:
  - name: goscaf
    repository:
      owner: goscaf-dev
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TOKEN }}"
    description: "Enterprise-grade Go project scaffolder"
    homepage: "https://github.com/iyashjayesh/goscaf"
    license: "MIT"
    commit_author:
      name: gorelease-bot
      email: bot@goscaf.dev
    install: |
      bin.install "goscaf"
    test: |
      system "#{bin}/goscaf", "--version"

release:
  github:
    owner: goscaf-dev
    name: goscaf
  draft: false
  prerelease: auto
