run:
  timeout: 5m

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: github.com/iyashjayesh/goscaf
  revive:
    rules:
      - name: exported
      - name: unused-parameter

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - revive
    - bodyclose
    - contextcheck
    - gocritic
    - noctx
    - wrapcheck

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - wrapcheck
        - errcheck
